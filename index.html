<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Axonometric Room</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0b2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ff9d00;
            text-shadow: 2px 2px 0px #000;
        }
        p {
            margin: 5px 0 0 0;
            font-size: 14px;
            text-shadow: 1px 1px 0px #000;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: opacity 0.5s ease;
            z-index: 20;
        }
        
        /* --- VIRTUAL JOYSTICKS CSS --- */
        .joystick-zone {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 120px;
            background: rgba(26, 11, 46, 0.6);
            border: 2px solid rgba(255, 157, 0, 0.5);
            border-radius: 50%;
            touch-action: none;
            user-select: none;
            z-index: 100;
        }
        #joystick-left { left: 30px; }
        #joystick-right { right: 30px; }
        .joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255, 157, 0, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- CONTROLS CSS --- */
        #altitude-control {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 157, 0, 0.8);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 100;
            user-select: none;
            text-shadow: 1px 1px 0px #000;
        }
        #altitude-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 20px;
            height: 90px;
            margin-top: 8px;
            accent-color: #ff9d00;
            cursor: ns-resize;
        }

        .icon-btn {
            position: absolute;
            top: 20px;
            width: 44px;
            height: 44px;
            background: rgba(26, 11, 46, 0.6);
            border: 2px solid rgba(255, 157, 0, 0.8);
            border-radius: 50%;
            color: #ff9d00;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:active {
            background: rgba(255, 157, 0, 0.8);
            color: #1a0b2e;
            transform: scale(0.9);
        }
        #center-btn { right: 20px; font-size: 26px; }
        #audio-btn { right: 75px; }

        #top-controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            user-select: none;
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 157, 0, 0.8);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px #000;
            background: rgba(26, 11, 46, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid rgba(255, 157, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        #time-slider { width: 150px; margin-top: 8px; accent-color: #ff9d00; cursor: pointer; }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 4px;
        }
        .switch-bg {
            width: 40px;
            height: 20px;
            background: #1a0b2e;
            border-radius: 10px;
            position: relative;
            border: 1px solid rgba(255, 157, 0, 0.5);
        }
        .switch-knob {
            width: 16px;
            height: 16px;
            background: #ff9d00;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 2px;
            transition: left 0.3s;
        }
        .weather-rainy .switch-knob {
            left: 20px;
            background: #00f0ff;
        }

        @media (max-width: 600px) {
            .joystick-zone { width: 100px; height: 100px; bottom: 20px; }
            #joystick-left { left: 20px; }
            #joystick-right { right: 20px; }
            .joystick-stick { width: 40px; height: 40px; }
            #altitude-control { bottom: 20px; }
            #altitude-slider { height: 70px; }
            #top-controls { top: 10px; }
            .control-panel { padding: 6px 12px; }
            #time-slider { width: 120px; }
            #ui-layer { display: none; } 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="loading">Building the room...</div>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <h1>Cozy Sunlit Room</h1>
        <p>WASD/Joysticks to move &bull; <strong>Drag curtains</strong> &bull; <strong>Tap objects</strong></p>
    </div>

    <!-- TOP CONTROLS (Time & Weather) -->
    <div id="top-controls">
        <div class="control-panel">
            <label for="time-slider">Time: <span id="time-display">15:00</span></label>
            <input type="range" id="time-slider" min="0" max="24" step="0.1" value="15">
        </div>
        <div class="control-panel toggle-switch" id="weather-toggle">
            <span>Sun</span>
            <div class="switch-bg"><div class="switch-knob"></div></div>
            <span>Rain</span>
        </div>
    </div>

    <!-- VIRTUAL JOYSTICKS HTML -->
    <div id="joystick-left" class="joystick-zone"><div id="stick-left" class="joystick-stick"></div></div>
    <div id="altitude-control">
        <label for="altitude-slider">Altitude</label>
        <input type="range" id="altitude-slider" orient="vertical" min="-3" max="6" step="0.1" value="0">
    </div>
    <div id="joystick-right" class="joystick-zone"><div id="stick-right" class="joystick-stick"></div></div>

    <!-- TOP RIGHT BUTTONS -->
    <div id="audio-btn" class="icon-btn" title="Toggle Audio">🔇</div>
    <div id="center-btn" class="icon-btn" title="Center Camera">⌖</div>

    <script>
        window.onload = function() {
            init();
        };

        let scene, camera, renderer;
        let dustParticles, dustMat;
        let rainParticles, rainMat;
        let roomGroup, wallGroupZMinus, wallGroupXMinus, wallGroupZPlus, wallGroupXPlus;
        
        // --- NEW VARIABLES FOR DAYLIGHT & WEATHER ---
        let sunLight, ambientLight;
        let currentSlope = -0.8; 
        let godRayWest, godRayEast;
        let rayMatWest, rayMatEast;
        let isRaining = false;
        let weatherBlend = 0.0; 

        let timeSliderEl;

        // Dual-Window Daylight Cycle
        // s: controls the angle of the light beam (positive for morning/East, negative for afternoon/West)
        // boW: West Beam Opacity, boE: East Beam Opacity
        const timeStops = [
            { t: 0,    c: 0x4a5b7c, i: 0.1, ac: 0x15102a, ai: 0.3, s: 0.5,  glass: 0x2b3a5c, bg: 0x0a0514, boW: 0.2, boE: 0.2 },
            { t: 6,    c: 0xffaa88, i: 1.0, ac: 0x2a2b3d, ai: 0.5, s: 0.2,  glass: 0xffaa88, bg: 0x1f1f2e, boW: 0.0, boE: 0.8 }, // East dawn
            { t: 9,    c: 0xffeebb, i: 3.5, ac: 0x5a4b6c, ai: 0.7, s: 0.8,  glass: 0xffeebb, bg: 0x3a4b6c, boW: 0.0, boE: 1.0 }, // East morning
            { t: 12,   c: 0xffffff, i: 0.0, ac: 0x7a8cad, ai: 0.9, s: 4.0,  glass: 0xffffff, bg: 0x4a5b7c, boW: 0.0, boE: 0.0 }, // Noon
            { t: 12.5, c: 0xffffff, i: 3.0, ac: 0x6a7b9c, ai: 0.9, s: -3.5, glass: 0xffffff, bg: 0x3a4b6c, boW: 0.4, boE: 0.0 }, // West early afternoon
            { t: 16,   c: 0xffeebb, i: 3.5, ac: 0x5a4b6c, ai: 0.7, s: -1.0, glass: 0xffeebb, bg: 0x2a2b4c, boW: 0.8, boE: 0.0 }, // West afternoon
            { t: 19,   c: 0xff6622, i: 2.5, ac: 0x3a1b2d, ai: 0.4, s: -0.1, glass: 0xff8844, bg: 0x1a0b1e, boW: 1.0, boE: 0.0 }, // West sunset
            { t: 20,   c: 0x4a5b7c, i: 0.1, ac: 0x15102a, ai: 0.3, s: -0.5, glass: 0x4a5b7c, bg: 0x0d0818, boW: 0.2, boE: 0.2 },
            { t: 24,   c: 0x4a5b7c, i: 0.1, ac: 0x15102a, ai: 0.3, s: -0.5, glass: 0x2b3a5c, bg: 0x0a0514, boW: 0.2, boE: 0.2 }
        ];

        const rainAmbColor = new THREE.Color(0x3a4b5c);
        const rainBgColor = new THREE.Color(0x1a2b3c);
        const rainGlassColor = new THREE.Color(0x5a7b8c);
        // ----------------------------------------

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let interactables = []; 
        
        let isLampOn = false;
        let lampLight, lampShadeMat, lampShadeMesh, lampChainGroup;
        let isMonitorOn = true;
        let monitorLight, screenMat;
        let chairSpinGroup;
        let chairSpinVelocity = 0;
        let blanketMesh;
        let drawers = [];
        let plantLeaves = [];
        let hourHand, minuteHand;
        
        // Curtain variables for both windows
        let curtainMeshWest, curtainMeshEast;
        let isDraggingCurtainWest = false;
        let isDraggingCurtainEast = false;
        let curtainClosedAmountWest = 0.0;
        let curtainClosedAmountEast = 0.0;
        const windowPlaneWest = new THREE.Plane(new THREE.Vector3(1, 0, 0), 5.5);
        const windowPlaneEast = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 5.5);
        
        // --- CAMERA & JOYS VARIABLES ---
        let cameraTarget = new THREE.Vector3();
        let roomCenter = new THREE.Vector3();
        let cameraSpherical = new THREE.Spherical();
        let altitudeSlider;
        const joysticks = { move: { x: 0, y: 0, active: false, identifier: null }, look: { x: 0, y: 0, active: false, identifier: null } };
        const keys = { w: false, a: false, s: false, d: false };

        // --- AUDIO SYSTEM ---
        let audioCtx;
        let isAudioMuted = true;
        let rainGain, rainFilter;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            noiseSource.loop = true;
            
            rainFilter = audioCtx.createBiquadFilter();
            rainFilter.type = 'lowpass';
            rainFilter.frequency.value = 400; 
            
            rainGain = audioCtx.createGain();
            rainGain.gain.value = 0; 
            
            noiseSource.connect(rainFilter).connect(rainGain).connect(audioCtx.destination);
            noiseSource.start();
        }

        function playSound(type) {
            if (isAudioMuted || !audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'thump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'rustle') {
                const bufferSize = audioCtx.sampleRate * 0.2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 800;
                noise.connect(filter).connect(gain).connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                noise.start(now);
            }
        }

        function updateSpring(mesh, vectorName, prop, target, tension, friction) {
            if (!mesh.userData.vel) mesh.userData.vel = {};
            let key = vectorName + '_' + prop; 
            if (mesh.userData.vel[key] === undefined) mesh.userData.vel[key] = 0;
            let force = (target - mesh[vectorName][prop]) * tension;
            mesh.userData.vel[key] = (mesh.userData.vel[key] + force) * friction;
            mesh[vectorName][prop] += mesh.userData.vel[key];
        }

        let woodBump, fabricBump, wallBump;
        function createProceduralTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            if (type === 'fabric') {
                const imgData = ctx.createImageData(512, 512);
                for(let i=0; i<imgData.data.length; i+=4) {
                    const c = 120 + Math.random() * 135;
                    imgData.data[i] = c; imgData.data[i+1] = c; imgData.data[i+2] = c; imgData.data[i+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
            } else if (type === 'wood') {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 512; tempCanvas.height = 4; 
                const tempCtx = tempCanvas.getContext('2d');
                const imgData = tempCtx.createImageData(512, 4);
                for(let i=0; i<imgData.data.length; i+=4) {
                    const c = 80 + Math.random() * 175;
                    imgData.data[i] = c; imgData.data[i+1] = c; imgData.data[i+2] = c; imgData.data[i+3] = 255;
                }
                tempCtx.putImageData(imgData, 0, 0);
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(tempCanvas, 0, 0, 512, 512);
            } else if (type === 'wall') {
                const imgData = ctx.createImageData(512, 512);
                for(let i=0; i<imgData.data.length; i+=4) {
                    const c = 220 + Math.random() * 35;
                    imgData.data[i] = c; imgData.data[i+1] = c; imgData.data[i+2] = c; imgData.data[i+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a0b2e);

            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 22; 
            camera = new THREE.OrthographicCamera(
                frustumSize * aspect / -2, frustumSize * aspect / 2,
                frustumSize / 2, frustumSize / -2, 1, 1000
            );
            
            camera.position.set(20, 20, 20);
            camera.lookAt(scene.position);

            const container = document.getElementById('canvas-container');
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0x221533, 0.5);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xfff5b3, 2.5);
            sunLight.target.position.set(0, 0, 1);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 50;
            sunLight.shadow.camera.left = -15;
            sunLight.shadow.camera.right = 15;
            sunLight.shadow.camera.top = 15;
            sunLight.shadow.camera.bottom = -15;
            sunLight.shadow.bias = -0.001;
            scene.add(sunLight);
            scene.add(sunLight.target);

            const fillLight = new THREE.PointLight(0x5a3b75, 0.4, 20);
            fillLight.position.set(4, 4, -4);
            scene.add(fillLight);

            woodBump = createProceduralTexture('wood');
            fabricBump = createProceduralTexture('fabric');
            wallBump = createProceduralTexture('wall');

            const format = (THREE.RedFormat !== undefined) ? THREE.RedFormat : THREE.LuminanceFormat;
            const colors = new Uint8Array([70, 160, 255]);
            const gradientMap = new THREE.DataTexture(colors, colors.length, 1, format);
            gradientMap.needsUpdate = true; gradientMap.minFilter = THREE.NearestFilter; gradientMap.magFilter = THREE.NearestFilter; gradientMap.generateMipmaps = false;

            function createToonMaterial(colorHex, textureType = null) {
                const params = { color: colorHex, gradientMap: gradientMap };
                if (textureType === 'wood') { params.bumpMap = woodBump; params.bumpScale = 0.05; }
                else if (textureType === 'fabric') { params.bumpMap = fabricBump; params.bumpScale = 0.03; }
                else if (textureType === 'wall') { params.bumpMap = wallBump; params.bumpScale = 0.015; }
                return new THREE.MeshToonMaterial(params);
            }

            function addOutline(mesh, thickness = 1) {
                const edges = new THREE.EdgesGeometry(mesh.geometry, 15);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x110022, linewidth: thickness });
                const lines = new THREE.LineSegments(edges, lineMat);
                mesh.add(lines);
            }

            roomGroup = new THREE.Group();
            scene.add(roomGroup);

            wallGroupZMinus = new THREE.Group(); 
            wallGroupXMinus = new THREE.Group(); 
            wallGroupZPlus = new THREE.Group();  
            wallGroupXPlus = new THREE.Group();  
            roomGroup.add(wallGroupZMinus, wallGroupXMinus, wallGroupZPlus, wallGroupXPlus);

            const wallMat = createToonMaterial(0xff8759, 'wall');

            // --- BUILD THE ENVIRONMENT ---
            const floorGeo = new THREE.BoxGeometry(12, 0.5, 12);
            const floorMat = createToonMaterial(0xff6b6b, 'wood');
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.25;
            floor.receiveShadow = true;
            addOutline(floor);
            roomGroup.add(floor);
            
            // North Wall
            const wallZMLGeo = new THREE.BoxGeometry(7, 8, 0.5);
            const wallZML = new THREE.Mesh(wallZMLGeo, wallMat);
            wallZML.position.set(-2.5, 4, -5.75);
            wallZML.receiveShadow = true; wallZML.castShadow = true;
            addOutline(wallZML); wallGroupZMinus.add(wallZML);

            const wallZMRGeo = new THREE.BoxGeometry(2, 8, 0.5);
            const wallZMR = new THREE.Mesh(wallZMRGeo, wallMat);
            wallZMR.position.set(5, 4, -5.75);
            wallZMR.receiveShadow = true; wallZMR.castShadow = true;
            addOutline(wallZMR); wallGroupZMinus.add(wallZMR);

            const wallZMTopGeo = new THREE.BoxGeometry(3, 2, 0.5);
            const wallZMTop = new THREE.Mesh(wallZMTopGeo, wallMat);
            wallZMTop.position.set(1.5, 7, -5.75);
            wallZMTop.receiveShadow = true; wallZMTop.castShadow = true;
            addOutline(wallZMTop); wallGroupZMinus.add(wallZMTop);

            // West/Left Wall (Extruded shape)
            const wallXMShape = new THREE.Shape();
            wallXMShape.moveTo(-6, 0); wallXMShape.lineTo(6, 0); wallXMShape.lineTo(6, 8); wallXMShape.lineTo(-6, 8); wallXMShape.lineTo(-6, 0);
            const westWindowHole = new THREE.Path();
            westWindowHole.moveTo(-4.5, 2.5); westWindowHole.lineTo(-4.5, 6.5); westWindowHole.lineTo(4.5, 6.5); westWindowHole.lineTo(4.5, 2.5); westWindowHole.lineTo(-4.5, 2.5);
            wallXMShape.holes.push(westWindowHole);

            const wallXMGeo = new THREE.ExtrudeGeometry(wallXMShape, { depth: 0.5, bevelEnabled: false });
            const posXM = wallXMGeo.attributes.position;
            for(let i=0; i<posXM.count; i++) {
                posXM.setXYZ(i, -5.5 - posXM.getZ(i), posXM.getY(i), posXM.getX(i));
            }
            wallXMGeo.computeVertexNormals();
            const wallXM = new THREE.Mesh(wallXMGeo, wallMat);
            wallXM.receiveShadow = true; wallXM.castShadow = true;
            addOutline(wallXM); wallGroupXMinus.add(wallXM);

            // East/Right Wall (NEW Extruded shape for window over desk)
            const wallXPShape = new THREE.Shape();
            wallXPShape.moveTo(-6, 0); wallXPShape.lineTo(6, 0); wallXPShape.lineTo(6, 8); wallXPShape.lineTo(-6, 8); wallXPShape.lineTo(-6, 0);
            const eastWindowHole = new THREE.Path();
            // Clockwise winding. Z from -1 to 5, Y from 2.5 to 6.5
            eastWindowHole.moveTo(-1, 2.5); eastWindowHole.lineTo(-1, 6.5); eastWindowHole.lineTo(5, 6.5); eastWindowHole.lineTo(5, 2.5); eastWindowHole.lineTo(-1, 2.5);
            wallXPShape.holes.push(eastWindowHole);

            const wallXPGeo = new THREE.ExtrudeGeometry(wallXPShape, { depth: 0.5, bevelEnabled: false });
            const posXP = wallXPGeo.attributes.position;
            for(let i=0; i<posXP.count; i++) {
                // Pos mapped from Shape(Z,Y). Extrude depth is X.
                posXP.setXYZ(i, 5.5 + posXP.getZ(i), posXP.getY(i), posXP.getX(i));
            }
            wallXPGeo.computeVertexNormals();
            const wallXP = new THREE.Mesh(wallXPGeo, wallMat);

                        float dist = distance(vWorldPosition, monitorPos); float monitorInfluence = smoothstep(4.5, 0.0, dist) * monitorIntensity;
                        if (beamOp < 0.01 && monitorInfluence < 0.01) discard;

                        vec3 finalColor = sunColor * beamOp + monitorColor * monitorInfluence;
                        float alpha = min(1.0, (beamOp * 0.8) + monitorInfluence);
                        gl_FragColor = vec4(finalColor, alphaShape * alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
            dustParticles = new THREE.Points(dustGeo, dustMat);
            roomGroup.add(dustParticles); 

            // Weather Rain Particles
            const rainParticleCount = 800;
            const rainGeo = new THREE.BufferGeometry();
            const rainPos = new Float32Array(rainParticleCount * 6); 
            for (let i = 0; i < rainParticleCount; i++) {
                // Wrap rain completely around the outside bounds of the room
                let x = (Math.random() > 0.5) ? -12 + Math.random() * 6 : 6 + Math.random() * 6;
                let y = Math.random() * 15;
                let z = -8 + Math.random() * 16; 
                rainPos[i*6] = x; rainPos[i*6+1] = y; rainPos[i*6+2] = z;
                rainPos[i*6+3] = x; rainPos[i*6+4] = y - 0.8; rainPos[i*6+5] = z; 
            }
            rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
            rainMat = new THREE.LineBasicMaterial({ color: 0x99ccff, transparent: true, opacity: 0.0, depthWrite: false });
            rainParticles = new THREE.LineSegments(rainGeo, rainMat);
            scene.add(rainParticles);

            // --- MATERIAL CLONING FOR INVISIBLE SHADOW CASTERS ---
            [wallGroupZMinus, wallGroupXMinus, wallGroupZPlus, wallGroupXPlus].forEach(group => {
                group.traverse(child => {
                    if (child.isMesh && child.material) child.material = child.material.clone();
                });
                group.userData.isVisible = true; 
            });

            const box = new THREE.Box3().setFromObject(roomGroup);
            const center = box.getCenter(new THREE.Vector3());
            roomGroup.position.x += (roomGroup.position.x - center.x);
            roomGroup.position.y += (roomGroup.position.y - center.y) + 2; 
            roomGroup.position.z += (roomGroup.position.z - center.z);
            
            roomCenter.copy(roomGroup.position);
            cameraTarget.copy(roomCenter);
            cameraSpherical.setFromVector3(camera.position.clone().sub(cameraTarget));

            altitudeSlider = document.getElementById('altitude-slider');
            timeSliderEl = document.getElementById('time-slider');

            document.getElementById('center-btn').addEventListener('click', () => { playSound('click'); cameraTarget.x = roomCenter.x; cameraTarget.z = roomCenter.z; });

            const audioBtn = document.getElementById('audio-btn');
            audioBtn.addEventListener('click', () => {
                initAudio(); isAudioMuted = !isAudioMuted; audioBtn.innerText = isAudioMuted ? '🔇' : '🔊';
                if (!isAudioMuted) playSound('click');
                if (rainGain) rainGain.gain.setTargetAtTime(!isAudioMuted && isRaining ? 0.3 : 0.0, audioCtx.currentTime, 0.5);
            });

            const weatherToggle = document.getElementById('weather-toggle');
            weatherToggle.addEventListener('click', () => {
                playSound('click'); isRaining = !isRaining; weatherToggle.classList.toggle('weather-rainy');
                if (rainGain && !isAudioMuted) rainGain.gain.setTargetAtTime(isRaining ? 0.3 : 0.0, audioCtx.currentTime, 1.0);
            });

            timeSliderEl.addEventListener('input', () => {});

            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('wheel', (e) => {
                camera.zoom -= e.deltaY * 0.001; camera.zoom = Math.max(1.0, Math.min(4.0, camera.zoom)); camera.updateProjectionMatrix();
            }, { passive: true });
            
            window.addEventListener('keydown', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; });
            window.addEventListener('keyup', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; });
            
            window.addEventListener('pointerdown', (e) => {
                initAudio(); 
                if (e.target.closest('.joystick-zone') || e.target.closest('.icon-btn') || e.target.closest('#altitude-control') || e.target.closest('#top-controls')) return;

                let intersects = updateRaycaster(e.clientX, e.clientY, interactables);
                if (intersects.length > 0 && intersects[0].object.userData.onClick) {
                    intersects[0].object.userData.onClick.call(intersects[0].object); return; 
                }

                // Check West Curtain
                let hitWest = updateRaycaster(e.clientX, e.clientY, [curtainMeshWest]);
                if (hitWest.length > 0) { isDraggingCurtainWest = true; playSound('rustle'); document.body.style.cursor = 'ns-resize'; return; }
                
                // Check East Curtain
                let hitEast = updateRaycaster(e.clientX, e.clientY, [curtainMeshEast]);
                if (hitEast.length > 0) { isDraggingCurtainEast = true; playSound('rustle'); document.body.style.cursor = 'ns-resize'; return; }
            });

            window.addEventListener('pointermove', (e) => {
                if (isDraggingCurtainWest) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; raycaster.setFromCamera(mouse, camera);
                    const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(windowPlaneWest, hit);
                    if (hit) { curtainClosedAmountWest = (6.4 - Math.max(2.6, Math.min(6.4, hit.y))) / 3.8; updateCurtainVisuals(); }
                } else if (isDraggingCurtainEast) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; raycaster.setFromCamera(mouse, camera);
                    const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(windowPlaneEast, hit);
                    if (hit) { curtainClosedAmountEast = (6.4 - Math.max(2.6, Math.min(6.4, hit.y))) / 3.8; updateCurtainVisuals(); }
                } else {
                    let cursor = 'default';
                    if (!e.target.closest('.joystick-zone') && !e.target.closest('.icon-btn') && !e.target.closest('#altitude-control') && !e.target.closest('#top-controls')) {
                        let intersects = updateRaycaster(e.clientX, e.clientY, interactables);
                        if (intersects.length > 0 && intersects[0].object.userData.onClick) cursor = 'pointer';
                        else if (updateRaycaster(e.clientX, e.clientY, [curtainMeshWest, curtainMeshEast]).length > 0) cursor = 'ns-resize';
                    }
                    document.body.style.cursor = cursor;
                }
            });

            window.addEventListener('pointerup', () => { isDraggingCurtainWest = false; isDraggingCurtainEast = false; });
            window.addEventListener('pointercancel', () => { isDraggingCurtainWest = false; isDraggingCurtainEast = false; });
            
            function updateCurtainVisuals() {
                if (curtainMeshWest) { curtainMeshWest.scale.y = Math.max(0.02, curtainClosedAmountWest); rayMatWest.uniforms.curtainBottomY.value = 6.4 - (curtainClosedAmountWest * 3.8); }
                if (curtainMeshEast) { curtainMeshEast.scale.y = Math.max(0.02, curtainClosedAmountEast); rayMatEast.uniforms.curtainBottomYEast.value = 6.4 - (curtainClosedAmountEast * 3.8); }
                if (dustMat && dustMat.uniforms) {
                    dustMat.uniforms.curtainBottomY.value = 6.4 - (curtainClosedAmountWest * 3.8);
                    dustMat.uniforms.curtainBottomYEast.value = 6.4 - (curtainClosedAmountEast * 3.8);
                }
            }

            function toggleLamp() {
                playSound('click'); isLampOn = !isLampOn; lampLight.intensity = isLampOn ? 1.5 : 0; lampShadeMat.emissiveIntensity = isLampOn ? 0.6 : 0.0;
                if(!lampChainGroup.userData.vel) lampChainGroup.userData.vel = {}; lampChainGroup.userData.vel.rotation_z = (lampChainGroup.userData.vel.rotation_z || 0) + 0.3;
            }

            function updateRaycaster(clientX, clientY, objectsArray) {
                mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1; raycaster.setFromCamera(mouse, camera);
                return raycaster.intersectObjects(objectsArray, false).filter(hit => !hit.object.material || hit.object.material.colorWrite !== false);
            }
            
            function setupJoystick(zoneId, stickId, dataObj) {
                const zone = document.getElementById(zoneId); const stick = document.getElementById(stickId);
                const maxRadius = zone.offsetWidth / 2 - stick.offsetWidth / 2; let origin = { x: 0, y: 0 };
                zone.addEventListener('pointerdown', (e) => { dataObj.active = true; dataObj.identifier = e.pointerId; const rect = zone.getBoundingClientRect(); origin.x = rect.left + rect.width / 2; origin.y = rect.top + rect.height / 2; zone.setPointerCapture(e.pointerId); updateStick(e); });
                zone.addEventListener('pointermove', (e) => { if (!dataObj.active || e.pointerId !== dataObj.identifier) return; updateStick(e); });
                const resetStick = (e) => { if (e.pointerId !== dataObj.identifier) return; dataObj.active = false; dataObj.identifier = null; dataObj.x = 0; dataObj.y = 0; stick.style.transform = `translate(-50%, -50%)`; };
                zone.addEventListener('pointerup', resetStick); zone.addEventListener('pointercancel', resetStick);
                function updateStick(e) { let dx = e.clientX - origin.x, dy = e.clientY - origin.y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; } stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; dataObj.x = dx / maxRadius; dataObj.y = dy / maxRadius; }
            }

            setupJoystick('joystick-left', 'stick-left', joysticks.move);
            setupJoystick('joystick-right', 'stick-right', joysticks.look);
            animate();
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight; const frustumSize = 22; 
            camera.left = -frustumSize * aspect / 2; camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2; camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateTimeOfDay(val) {
            let hrs = Math.floor(val); let mins = Math.floor((val - hrs) * 60);
            document.getElementById('time-display').innerText = `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

            if (minuteHand && hourHand) {
                minuteHand.rotation.z = -((val % 1) * 60) / 60 * Math.PI * 2;
                hourHand.rotation.z = -((hrs % 12) + (val % 1)) / 12 * Math.PI * 2;
            }

            let start = timeStops[0], end = timeStops[1];
            for(let i=0; i<timeStops.length-1; i++) { if (val >= timeStops[i].t && val <= timeStops[i+1].t) { start = timeStops[i]; end = timeStops[i+1]; break; } }
            let progress = (val - start.t) / (end.t - start.t);

            let sColor = new THREE.Color(start.c).lerp(new THREE.Color(end.c), progress);
            let aColor = new THREE.Color(start.ac).lerp(new THREE.Color(end.ac), progress);
            let gColor = new THREE.Color(start.glass).lerp(new THREE.Color(end.glass), progress);
            let bgColor = new THREE.Color(start.bg).lerp(new THREE.Color(end.bg), progress);
            
            sColor.lerp(rainAmbColor, weatherBlend); aColor.lerp(rainAmbColor, weatherBlend);
            gColor.lerp(rainGlassColor, weatherBlend); bgColor.lerp(rainBgColor, weatherBlend);

            let intensity = start.i + (end.i - start.i) * progress;
            sunLight.intensity = intensity * (1.0 - weatherBlend); 
            ambientLight.intensity = start.ai + (end.ai - start.ai) * progress;
            
            currentSlope = start.s + (end.s - start.s) * progress;
            let currentBeamOpWest = (start.boW + (end.boW - start.boW) * progress) * (1.0 - weatherBlend); 
            let currentBeamOpEast = (start.boE + (end.boE - start.boE) * progress) * (1.0 - weatherBlend); 

            sunLight.color.copy(sColor); ambientLight.color.copy(aColor);
            
            // Adjust sun physical position for shadow casting based on time of day slope!
            if (currentSlope > 0) sunLight.position.set(5.6 + 15, 4.5 + (15 * currentSlope), 0);
            else sunLight.position.set(-5.6 - 15, 4.5 + (15 * Math.abs(currentSlope)), 0);

            if (rayMatWest) { rayMatWest.uniforms.color.value.copy(sColor); rayMatWest.uniforms.lightSlope.value = currentSlope; rayMatWest.uniforms.beamOpacity.value = currentBeamOpWest; }
            if (rayMatEast) { rayMatEast.uniforms.color.value.copy(sColor); rayMatEast.uniforms.lightSlope.value = currentSlope; rayMatEast.uniforms.beamOpacityEast.value = currentBeamOpEast; }
            
            if (dustMat && dustMat.uniforms) {
                dustMat.uniforms.sunColor.value.copy(sColor);
                dustMat.uniforms.beamOpacity.value = currentBeamOpWest;
                dustMat.uniforms.beamOpacityEast.value = currentBeamOpEast;
                dustMat.uniforms.lightSlope.value = currentSlope;
            }
            
            // Update glass materials for BOTH windows dynamically
            wallGroupXMinus.traverse(child => { if (child.material && child.material.transparent) child.material.color.copy(gColor); });
            wallGroupXPlus.traverse(child => { if (child.userData.isGlass) child.material.color.copy(gColor); });

            scene.background = bgColor; document.body.style.backgroundColor = '#' + bgColor.getHexString();

            // SKEW WEST GOD RAY
            if (godRayWest && godRayWest.geometry && godRayWest.userData.origPos) {
                const pos = godRayWest.geometry.attributes.position; const orig = godRayWest.userData.origPos;
                for (let i = 0; i < pos.count; i++) {
                    let x = orig[i * 3];
                    if (x < 0) x = -15; else x = 10;
                    pos.setXY(i, x, orig[i * 3 + 1] + x * currentSlope);
                }
                pos.needsUpdate = true; godRayWest.geometry.computeVertexNormals();
            }

            // SKEW EAST GOD RAY
            if (godRayEast && godRayEast.geometry && godRayEast.userData.origPos) {
                const pos = godRayEast.geometry.attributes.position; const orig = godRayEast.userData.origPos;
                for (let i = 0; i < pos.count; i++) {
                    let x = orig[i * 3];
                    if (x > 0) x = 15; else x = -10;
                    pos.setXY(i, x, orig[i * 3 + 1] + x * currentSlope);
                }
                pos.needsUpdate = true; godRayEast.geometry.computeVertexNormals();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            let targetWeatherBlend = isRaining ? 1.0 : 0.0;
            weatherBlend += (targetWeatherBlend - weatherBlend) * 0.05;
            
            if (timeSliderEl) updateTimeOfDay(parseFloat(timeSliderEl.value));

            // --- CAMERA UPDATES ---
            let lookSpeed = 0.02, moveSpeed = 0.06;
            if (joysticks.move.active && joysticks.look.active) {
                const spreadX = joysticks.look.x - joysticks.move.x, pushY = -(joysticks.move.y + joysticks.look.y);
                camera.zoom += (spreadX + pushY) * 0.015; camera.zoom = Math.max(1.0, Math.min(4.0, camera.zoom)); 
                camera.updateProjectionMatrix(); lookSpeed *= 0.1; moveSpeed *= 0.1;
            }
            if (joysticks.look.active) {
                cameraSpherical.theta -= joysticks.look.x * lookSpeed; cameraSpherical.phi -= joysticks.look.y * lookSpeed; 
                cameraSpherical.phi = Math.max(0.2, Math.min(Math.PI / 2 - 0.1, cameraSpherical.phi));
            }
            let moveInputX = joysticks.move.active ? joysticks.move.x : 0, moveInputY = joysticks.move.active ? joysticks.move.y : 0;
            if (keys.w) moveInputY -= 1; if (keys.s) moveInputY += 1; if (keys.a) moveInputX -= 1; if (keys.d) moveInputX += 1;
            const moveLen = Math.sqrt(moveInputX * moveInputX + moveInputY * moveInputY);
            if (moveLen > 1) { moveInputX /= moveLen; moveInputY /= moveLen; }

            if (moveLen > 0) {
                const forward = new THREE.Vector3(); forward.setFromSphericalCoords(1, Math.PI / 2, cameraSpherical.theta).normalize();
                const right = new THREE.Vector3(); right.crossVectors(camera.up, forward).normalize();
                cameraTarget.addScaledVector(forward, moveInputY * moveSpeed); cameraTarget.addScaledVector(right, moveInputX * moveSpeed);
                const dx = cameraTarget.x - roomCenter.x, dz = cameraTarget.z - roomCenter.z;
                const dist2D = Math.sqrt(dx * dx + dz * dz);
                if (dist2D > 10.0) { const ratio = 10.0 / dist2D; cameraTarget.x = roomCenter.x + dx * ratio; cameraTarget.z = roomCenter.z + dz * ratio; }
            }
            if (altitudeSlider) cameraTarget.y = roomCenter.y + parseFloat(altitudeSlider.value);
            cameraSpherical.makeSafe(); camera.position.setFromSpherical(cameraSpherical).add(cameraTarget); camera.lookAt(cameraTarget);
            
            // --- FOREGROUND WALL HIDING ---
            if (roomGroup) {
                const setGroupVisibility = (group, isVisible) => {
                    if (group.userData.isVisible === isVisible) return;
                    group.userData.isVisible = isVisible;
                    group.traverse(child => {
                        if (child.isMesh && child.material) { child.material.colorWrite = isVisible; child.material.depthWrite = isVisible; }
                        if (child.type === 'LineSegments' || child.type === 'Line') child.visible = isVisible;
                    });
                };
                setGroupVisibility(wallGroupXPlus, camera.position.x <= roomCenter.x);
                setGroupVisibility(wallGroupXMinus, camera.position.x >= roomCenter.x);
                setGroupVisibility(wallGroupZPlus, camera.position.z <= roomCenter.z);
                setGroupVisibility(wallGroupZMinus, camera.position.z >= roomCenter.z);
            }
            
            // --- SPRING PHYSICS ---
            if (chairSpinGroup) { chairSpinGroup.rotation.y += chairSpinVelocity; chairSpinVelocity *= 0.94; }
            if (lampChainGroup) updateSpring(lampChainGroup, 'rotation', 'z', lampChainGroup.userData.targetRotZ, 0.2, 0.85);
            if (blanketMesh) { updateSpring(blanketMesh, 'position', 'z', blanketMesh.userData.targetZ, 0.1, 0.75); updateSpring(blanketMesh, 'position', 'y', blanketMesh.userData.targetY, 0.1, 0.75); updateSpring(blanketMesh, 'scale', 'z', blanketMesh.userData.targetScaleZ, 0.1, 0.75); }
            drawers.forEach(drawer => { updateSpring(drawer, 'position', 'x', drawer.userData.targetX, 0.15, 0.7); });
            plantLeaves.forEach(leaf => { updateSpring(leaf, 'rotation', 'x', leaf.userData.targetRotX, 0.1, 0.85); });

            // Dust Particles (Globally spawned, shader handles masking)
            if (dustParticles) {
                if (dustMat && dustMat.uniforms) dustMat.uniforms.zoom.value = camera.zoom;
                const positions = dustParticles.geometry.attributes.position.array;
                const speeds = dustParticles.geometry.attributes.speed.array;
                for (let i = 0; i < positions.length / 3; i++) {
                    positions[i * 3 + 1] += speeds[i]; // Drift up
                    positions[i * 3] += Math.sin(time * 0.5 + i) * 0.0015; // Sway
                    positions[i * 3 + 2] += Math.cos(time * 0.5 + i) * 0.0015;
                    // Reset to bottom if they float too high
                    if (positions[i * 3 + 1] > 8.0) {
                        positions[i * 3] = -5.5 + Math.random() * 11.0; 
                        positions[i * 3 + 2] = -5.5 + Math.random() * 11.0; 
                        positions[i * 3 + 1] = 0.0; 
                    }
                }
                dustParticles.geometry.attributes.position.needsUpdate = true;
            }

            // Rain Particles
            if (rainParticles) {
                rainMat.opacity = weatherBlend * 0.5; 
                const pos = rainParticles.geometry.attributes.position.array;
                for (let i = 0; i < pos.length; i += 6) {
                    pos[i+1] -= 0.6; pos[i+4] -= 0.6; 
                    if (pos[i+4] < -1.0) { let y = 10 + Math.random() * 5; pos[i+1] = y; pos[i+4] = y - 0.8; }
                }
                rainParticles.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
